apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecomm-product-service
  namespace: ecomm-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecomm-product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ecomm-product-service
    spec:
      containers:
        - name: product-service
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: ecomm-config
            - secretRef:
                name: ecomm-db-secret
          ports:
            - containerPort: 3001
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
